project: mdkit
env_files:
  - .env.local
  - .env
homepage: http://localhost:${TESTBENCH_PORT}
ports:
  [
    DOCS_PORT,
    TESTBENCH_API_PORT,
    TESTBENCH_PORT,
  ]
links:
  - name: testbench
    url: http://localhost:${TESTBENCH_PORT}
  - name: testbench-api
    url: http://localhost:${TESTBENCH_API_PORT}/health
  - name: docs
    url: http://localhost:${DOCS_PORT}
native:
  testbench:
    aliases: [mdkit, tb]
    cmd: pnpm --filter=@mp-lb/mdkit-testbench dev
    env: "*"
    depends_on:
      - testbench-api
  testbench-api:
    aliases: [mdkit-api, tb-api]
    cmd: pnpm --filter=@mp-lb/mdkit-testbench-backend dev
    env: "*"
  docs:
    cmd: pnpm --filter=@mp-lb/mdkit docs:dev
    env: "*"
tasks:
  lint:
    cmds:
      - pnpm lint
  check:
    cmds:
      - pnpm turbo run typecheck
  build:
    cmds:
      - pnpm turbo run build
  vitest:
    cmds:
      - pnpm test
  worktree_setup:
    cmds:
      - pnpm install
