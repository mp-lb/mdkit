name: Publish Package

on:
  push:
    branches: [main]
    paths:
      - "packages/mdkit/**"
      - ".github/workflows/publish.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
  workflow_dispatch:
    inputs:
      stable:
        description: "Publish the package.json version to latest instead of a main prerelease"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: publish-mdkit-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org/"
          scope: "@mp-lb"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set publish version
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.stable }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = "packages/mdkit/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const baseVersion = String(pkg.version).replace(/-.+$/, "");
          pkg.version = `${baseVersion}-main.${process.env.GITHUB_RUN_NUMBER}.${process.env.GITHUB_RUN_ATTEMPT}`;
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          console.log(`Publishing version ${pkg.version}`);
          NODE

      - name: Typecheck
        run: pnpm --filter=@mp-lb/mdkit typecheck

      - name: Test
        run: pnpm --filter=@mp-lb/mdkit test

      - name: Build
        run: pnpm --filter=@mp-lb/mdkit build

      - name: Build docs
        run: pnpm --filter=@mp-lb/mdkit docs:build

      - name: Publish
        run: |
          tag=main
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.stable }}" = "true" ]; then
            tag=latest
          fi

          pnpm --filter=@mp-lb/mdkit publish --no-git-checks --provenance --tag "$tag"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
